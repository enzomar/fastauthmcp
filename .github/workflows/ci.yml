name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install -e ".[dev]" ruff mypy types-PyYAML

      - name: Ruff check
        run: ruff check fastauthmcp/ tests/ examples/

      - name: Ruff format check
        run: ruff format --check fastauthmcp/ tests/ examples/

      - name: Type check
        run: mypy fastauthmcp/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]" pytest-cov

      - name: Run tests
        run: pytest -v --tb=short --cov=fastauthmcp --cov-report=xml --cov-report=term-missing

      - name: Run property-based tests with extended examples
        run: pytest tests/properties/ -v --hypothesis-seed=0

  compatibility-lab:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run compatibility lab
        run: python -m fastauthmcp.lab run

      - name: Upload lab report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lab-report
          path: reports/
