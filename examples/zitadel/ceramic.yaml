# yaml-language-server: $schema=../../ceramic.schema.json
# Ceramic configuration for the Zitadel example

auth:
  provider: oidc
  issuer: https://ceramic-oss-agq8i8.eu1.zitadel.cloud
  client_id: "380842820363183891"
  scopes:
    - openid
    - profile
    - email
    # Zitadel-specific scope to include project roles in the token
    - "urn:zitadel:iam:org:project:roles"
  callback_timeout: 120
  callback_port: 9876
  token_exchange_timeout: 30

observability:
  enabled: true
  metrics_path: /metrics
  metrics_port: 9090
  exporter: console
  log_format: json
  log_level: info

sessions:
  enabled: true
  ttl: 3600
